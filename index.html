<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Umut Osmanoglu — Game Developer</title>
  <meta name="description" content="Portfolio of Umut Osmanoglu, game developer. Games, engine and tools." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #070708; color: #e9e9ea; }
    body { font-family: "Space Grotesk", "Inter", system-ui, sans-serif; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }
    ::selection { background: #ff4747; color: #fff; }
    /* Loading splash */
    #boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #070708; z-index: 9999; transition: opacity 0.5s; }
    #boot.gone { opacity: 0; pointer-events: none; }
    #boot .dot { width: 8px; height: 8px; background: #ff4747; border-radius: 50%; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="boot"><div class="dot"></div></div>
  <div id="root"></div>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="site.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    ReactDOM.createRoot(document.getElementById('root')).render(<PortfolioApp />);
    setTimeout(() => { document.getElementById('boot')?.classList.add('gone'); }, 200);
  </script>
</body>
</html>
